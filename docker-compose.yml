services:
  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: defi-agent
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=local
    volumes:
      # Persist SQLite DB + config across container restarts
      - ./agent.db:/app/agent.db
      - ./server/src/config/local-config.json:/app/src/config/local-config.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
